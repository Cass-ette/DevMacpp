<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1e1e1e;
        }
        #container {
            width: 100%;
            height: 100%;
        }
        .breakpoint-line {
            background: rgba(255, 0, 0, 0.2) !important;
        }
        .breakpoint-glyph {
            background: #f00;
            border-radius: 50%;
            width: 10px !important;
            height: 10px !important;
            margin-left: 3px;
            margin-top: 5px;
        }
        .debug-line {
            background: rgba(0, 120, 212, 0.3) !important;
        }
        .debug-glyph {
            background: #0078d4;
            border-radius: 50%;
            width: 10px !important;
            height: 10px !important;
            margin-left: 3px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
        require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            // 创建编辑器
            window.editor = monaco.editor.create(document.getElementById('container'), {
                value: '',
                language: 'cpp',
                theme: 'vs-dark',
                fontSize: 13,
                fontFamily: 'Monaco, Menlo, monospace',
                lineNumbers: 'on',
                glyphMargin: true,
                folding: false,
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                automaticLayout: true,
                wordWrap: 'off',
                tabSize: 4,
                insertSpaces: true,
                renderWhitespace: 'selection',
                contextmenu: true,

                // 禁用所有智能功能（纯文本模式）
                quickSuggestions: false,
                suggestOnTriggerCharacters: false,
                acceptSuggestionOnEnter: 'off',
                tabCompletion: 'off',
                wordBasedSuggestions: 'off',
                parameterHints: { enabled: false },
                hover: { enabled: false },
                formatOnType: false,
                formatOnPaste: false,
                autoIndent: 'none',
                detectIndentation: false,
                renderLineHighlight: 'line',
                scrollbar: {
                    vertical: 'auto',
                    horizontal: 'auto',
                    useShadows: false,
                    verticalScrollbarSize: 10,
                    horizontalScrollbarSize: 10
                }
            });

            // 监听内容变化
            window.editor.onDidChangeModelContent(() => {
                const content = window.editor.getValue();
                window.webkit.messageHandlers.contentChange.postMessage({
                    content: content,
                    cursorLine: window.editor.getPosition().lineNumber,
                    cursorColumn: window.editor.getPosition().column
                });
            });

            // 监听光标位置变化
            window.editor.onDidChangeCursorPosition((e) => {
                window.webkit.messageHandlers.cursorChange.postMessage({
                    line: e.position.lineNumber,
                    column: e.position.column
                });
            });

            // 监听点击断点区域（行号左边距）
            window.editor.onMouseDown((e) => {
                if (e.target.type === 2) { // glyphMargin
                    const lineNumber = e.target.position?.lineNumber;
                    if (lineNumber) {
                        window.webkit.messageHandlers.breakpointToggle.postMessage({
                            line: lineNumber
                        });
                    }
                }
            });

            // 通知 Swift 编辑器已初始化
            window.webkit.messageHandlers.editorReady.postMessage({});
        });
    </script>
</body>
</html>
