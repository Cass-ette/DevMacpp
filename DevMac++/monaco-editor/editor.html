<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1e1e1e;
            position: relative;
        }
        #container {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
        }
        .breakpoint-line {
            background: rgba(255, 0, 0, 0.2) !important;
        }
        .breakpoint-glyph {
            background: #f00;
            border-radius: 50%;
            width: 10px !important;
            height: 10px !important;
            margin-left: 3px;
            margin-top: 5px;
        }
        .debug-line {
            background: rgba(0, 120, 212, 0.3) !important;
        }
        .debug-glyph {
            background: #0078d4;
            border-radius: 50%;
            width: 10px !important;
            height: 10px !important;
            margin-left: 3px;
            margin-top: 5px;
        }
        .find-match {
            background: rgba(255, 200, 0, 0.3);
        }
        .find-widget {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        .find-input {
            background: #3c3c3c;
            border: 1px solid #3e3e42;
            color: #cccccc;
            padding: 4px 8px;
            border-radius: 3px;
            font-family: 'Monaco', monospace;
            font-size: 12px;
            width: 200px;
        }
        .find-input:focus {
            outline: none;
            border-color: #007acc;
        }
        .find-btn {
            background: none;
            border: 1px solid #3e3e42;
            color: #cccccc;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .find-btn:hover {
            background: #3e3e42;
        }
        .find-count {
            color: #858585;
            font-size: 11px;
            min-width: 60px;
        }
        .find-close {
            margin-left: auto;
            background: none;
            border: none;
            color: #858585;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <!-- 后备纯文本编辑器（Monaco 加载失败时显示） -->
    <textarea id="fallback-editor" style="display:none; width:100%; height:100%; background:#1e1e1e; color:#d4d4d4; border:none; padding:10px; font:13px/1.5 'Monaco','Menlo',monospace; resize:none; outline:none;" placeholder="编辑器加载中..."></textarea>
    <!-- 加载提示 -->
    <div id="loading-indicator" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#858585; font-family:sans-serif; font-size:13px; text-align:center;">
        <div style="font-size:24px; margin-bottom:8px;">⌛</div>
        <div id="loading-text">正在加载编辑器...</div>
        <div id="loading-error" style="display:none; color:#f44336; margin-top:8px; max-width:400px;"></div>
    </div>
    <div id="find-widget" class="find-widget" style="display: none;">
        <input type="text" id="find-input" class="find-input" placeholder="查找...">
        <input type="text" id="replace-input" class="find-input" placeholder="替换..." style="width: 160px;">
        <button id="find-prev" class="find-btn">↑</button>
        <button id="find-next" class="find-btn">↓</button>
        <button id="replace-btn" class="find-btn">替换</button>
        <button id="replace-all-btn" class="find-btn">全部替换</button>
        <span id="find-count" class="find-count"></span>
        <button id="find-close" class="find-close">&times;</button>
    </div>
    <script src="min/vs/loader.js"></script>
    <script>
        // 超时检测 - 10秒后强制显示后备编辑器
        var monacoLoadTimeout = setTimeout(function() {
            var loadingError = document.getElementById('loading-error');
            var loadingIndicator = document.getElementById('loading-indicator');
            if (loadingError && document.getElementById('container').style.display !== 'none') {
                loadingError.textContent = 'Monaco 编辑器加载超时（CDN 无响应）。请检查网络连接，或将 App 移至有网络的环境。';
                loadingError.style.display = 'block';
                showFallbackEditor();
            }
        }, 10000);

        function showFallbackEditor() {
            var container = document.getElementById('container');
            var fallback = document.getElementById('fallback-editor');
            var indicator = document.getElementById('loading-indicator');
            if (container) container.style.display = 'none';
            if (indicator) indicator.style.display = 'none';
            if (fallback) {
                fallback.style.display = 'block';
                fallback.disabled = false;
                fallback.focus();
                // 后备编辑器内容变化通知
                fallback.addEventListener('input', function() {
                    window.webkit.messageHandlers.contentChange.postMessage({
                        content: fallback.value,
                        cursorLine: 1,
                        cursorColumn: 1
                    });
                });
            }
            window.monacoLoaded = false;
            window.webkit.messageHandlers.editorReady.postMessage({});
        }

        require.config({ paths: { vs: 'min/vs' } });
        require(['vs/editor/editor.main'], function () {
            clearTimeout(monacoLoadTimeout);
            // 创建编辑器
            window.editor = monaco.editor.create(document.getElementById('container'), {
                value: '',
                language: 'cpp',
                theme: 'vs-dark',
                fontSize: 13,
                fontFamily: 'Monaco, Menlo, monospace',
                lineNumbers: 'on',
                glyphMargin: true,
                folding: false,
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                automaticLayout: true,
                wordWrap: 'off',
                tabSize: 4,
                insertSpaces: true,
                renderWhitespace: 'selection',
                contextmenu: true,

                // 禁用所有智能功能（纯文本模式）
                quickSuggestions: false,
                suggestOnTriggerCharacters: false,
                acceptSuggestionOnEnter: 'off',
                tabCompletion: 'off',
                wordBasedSuggestions: 'off',
                parameterHints: { enabled: false },
                hover: { enabled: false },
                formatOnType: false,
                formatOnPaste: false,
                autoIndent: 'none',
                detectIndentation: false,
                renderLineHighlight: 'line',
                scrollbar: {
                    vertical: 'auto',
                    horizontal: 'auto',
                    useShadows: false,
                    verticalScrollbarSize: 10,
                    horizontalScrollbarSize: 10
                },
                // Disable Monaco's built-in find widget (we use our own custom widget)
                find: { addExtraSpace: false, autoSearchInWorkspace: false, seedSearchStringFromSelection: 'never', scope: 'editor' }
            });

            // 监听内容变化
            window.editor.onDidChangeModelContent(() => {
                const content = window.editor.getValue();
                window.webkit.messageHandlers.contentChange.postMessage({
                    content: content,
                    cursorLine: window.editor.getPosition().lineNumber,
                    cursorColumn: window.editor.getPosition().column
                });
            });

            // 监听光标位置变化
            window.editor.onDidChangeCursorPosition((e) => {
                window.webkit.messageHandlers.cursorChange.postMessage({
                    line: e.position.lineNumber,
                    column: e.position.column
                });
            });

            // 监听点击断点区域（行号左边距）
            window.editor.onMouseDown((e) => {
                if (e.target.type === 2) { // glyphMargin
                    const lineNumber = e.target.position?.lineNumber;
                    if (lineNumber) {
                        window.webkit.messageHandlers.breakpointToggle.postMessage({
                            line: lineNumber
                        });
                    }
                }
            });

            // ===== Find / Replace Widget =====
            const findWidget = document.getElementById('find-widget');
            const findInput = document.getElementById('find-input');
            const replaceInput = document.getElementById('replace-input');
            const findCountEl = document.getElementById('find-count');

            let currentMatch = 1;
            let totalMatches = 0;
            let savedDecorations = [];
            let savedFindDecorations = [];

            function openFindWidget() {
                findWidget.style.display = 'flex';
                findInput.focus();
                findInput.select();
            }

            function closeFindWidget() {
                findWidget.style.display = 'none';
                findInput.value = '';
                replaceInput.value = '';
                findCountEl.textContent = '';
                if (savedFindDecorations.length > 0) {
                    window.editor.deltaDecorations(savedFindDecorations, []);
                    savedFindDecorations = [];
                }
                currentMatch = 1;
                totalMatches = 0;
            }

            function doFind() {
                const searchString = findInput.value;
                if (!searchString) {
                    findCountEl.textContent = '';
                    if (savedFindDecorations.length > 0) {
                        window.editor.deltaDecorations(savedFindDecorations, []);
                        savedFindDecorations = [];
                    }
                    return;
                }
                const model = window.editor.getModel();
                const matches = model.findMatches(searchString, false, false, false, null, true);
                totalMatches = matches.length;
                currentMatch = matches.length > 0 ? 1 : 0;
                findCountEl.textContent = totalMatches > 0 ? `1 / ${totalMatches}` : '无匹配';

                const decorations = matches.map(m => ({
                    range: m.range,
                    options: {
                        className: 'find-match',
                        overviewRuler: { color: 'rgba(255,200,0,0.5)', position: 1 }
                    }
                }));
                savedFindDecorations = window.editor.deltaDecorations(savedFindDecorations, decorations);

                if (matches.length > 0) {
                    window.editor.revealLineInCenter(matches[0].range.startLineNumber);
                    window.editor.setPosition({
                        lineNumber: matches[0].range.startLineNumber,
                        column: matches[0].range.startColumn
                    });
                }
            }

            function findNext() {
                const matches = window.editor.getModel().findMatches(findInput.value, false, false, false, null, true);
                if (matches.length === 0) return;
                currentMatch = (currentMatch % matches.length) + 1;
                const match = matches[currentMatch - 1];
                window.editor.revealLineInCenter(match.range.startLineNumber);
                window.editor.setPosition({
                    lineNumber: match.range.startLineNumber,
                    column: match.range.startColumn
                });
                findCountEl.textContent = `${currentMatch} / ${matches.length}`;
            }

            function findPrev() {
                const matches = window.editor.getModel().findMatches(findInput.value, false, false, false, null, true);
                if (matches.length === 0) return;
                currentMatch = currentMatch > 1 ? currentMatch - 1 : matches.length;
                const match = matches[currentMatch - 1];
                window.editor.revealLineInCenter(match.range.startLineNumber);
                window.editor.setPosition({
                    lineNumber: match.range.startLineNumber,
                    column: match.range.startColumn
                });
                findCountEl.textContent = `${currentMatch} / ${matches.length}`;
            }

            function replaceOne() {
                const searchString = findInput.value;
                const replaceString = replaceInput.value;
                if (!searchString) return;
                const position = window.editor.getPosition();
                const model = window.editor.getModel();
                const matches = model.findMatches(searchString, false, false, false, null, true);
                for (const match of matches) {
                    if (match.range.startLineNumber === position.lineNumber &&
                        match.range.startColumn === position.column) {
                        model.pushEditOperations([], [{
                            range: match.range,
                            text: replaceString
                        }]);
                        break;
                    }
                }
                doFind();
            }

            function replaceAll() {
                const searchString = findInput.value;
                const replaceString = replaceInput.value;
                if (!searchString) return;
                const model = window.editor.getModel();
                const matches = model.findMatches(searchString, false, false, false, null, true);
                model.pushEditOperations([], matches.map(match => ({
                    range: match.range,
                    text: replaceString
                })));
                doFind();
            }

            document.getElementById('find-prev').addEventListener('click', findPrev);
            document.getElementById('find-next').addEventListener('click', findNext);
            document.getElementById('replace-btn').addEventListener('click', replaceOne);
            document.getElementById('replace-all-btn').addEventListener('click', replaceAll);
            document.getElementById('find-close').addEventListener('click', closeFindWidget);
            findInput.addEventListener('input', doFind);
            findInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.shiftKey ? findPrev() : findNext();
                }
            });
            document.addEventListener('keydown', (e) => {
                if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
                    e.preventDefault();
                    openFindWidget();
                }
                if (e.key === 'Escape' && findWidget.style.display !== 'none') {
                    closeFindWidget();
                }
            });

            // 通知 Swift 编辑器已初始化
            window.monacoLoaded = true;
            document.getElementById('loading-indicator').style.display = 'none';
            window.webkit.messageHandlers.editorReady.postMessage({});
        }, function(err) {
            // Monaco 加载失败
            clearTimeout(monacoLoadTimeout);
            var loadingError = document.getElementById('loading-error');
            if (loadingError) {
                loadingError.textContent = 'Monaco 编辑器加载失败：' + (err ? err.message : '未知错误') + '。请检查网络后重启应用。';
                loadingError.style.display = 'block';
            }
            showFallbackEditor();
        });
    </script>
</body>
</html>
